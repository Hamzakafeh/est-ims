<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zone 3 — QR Codes | EST-IMS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #1a3a5c;
    --accent2: #2563eb;
    --text: #e6edf3;
    --muted: #7d8590;
    --success: #3fb950;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-brand .badge { background: var(--accent2); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; }
  .topbar-brand h1 { font-size: 15px; font-weight: 700; color: var(--text); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn-sm { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; font-family: 'Tajawal', sans-serif; transition: all .15s; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }

  /* ── TABS ── */
  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 56px; z-index: 99; }
  .tab { padding: 12px 16px; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; white-space: nowrap; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .tab-count { background: var(--border); color: var(--muted); font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-right: 4px; font-family: 'IBM Plex Mono', monospace; }
  .tab.active .tab-count { background: rgba(37,99,235,.2); color: var(--accent2); }

  /* ── CONTENT ── */
  .content { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── SEARCH BAR ── */
  .search-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
  .search-wrap input {
    flex: 1; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'IBM Plex Mono', monospace;
    outline: none; transition: border .15s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* ── ITEMS GRID ── */
  .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    position: relative;
    overflow: hidden;
  }
  .item-card::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--item-color, var(--border));
    border-radius: 0 10px 10px 0;
  }
  .item-card:hover { border-color: var(--item-color, var(--accent2)); background: #1c2128; }
  .color-dot {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
    background: var(--item-color, var(--muted));
  }
  .item-info { flex: 1; min-width: 0; }
  .item-type { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .item-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sku { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .item-balance { text-align: left; flex-shrink: 0; }
  .item-num { font-size: 20px; font-weight: 900; color: var(--text); font-family: 'IBM Plex Mono', monospace; line-height: 1; }
  .item-unit { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .item-date { font-size: 9px; color: var(--muted); margin-top: 1px; font-family: 'IBM Plex Mono', monospace; }

  /* ── PRINT QR ── */
  .print-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .print-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: border-color .15s;
  }
  .print-card:hover { border-color: var(--accent2); }
  .print-card .p-type { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .print-card .p-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .print-card .p-size { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px; }
  .qr-wrap { display: flex; justify-content: center; margin-bottom: 8px; background: #fff; border-radius: 8px; padding: 10px; }
  .print-card .p-sku { font-size: 9px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); letter-spacing: .5px; margin-bottom: 10px; }
  .print-card .p-balance { font-size: 22px; font-weight: 900; color: var(--text); font-family: 'IBM Plex Mono', monospace; margin-bottom: 2px; }
  .print-card .p-date { font-size: 9px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px; }
  .btn-print { width: 100%; padding: 9px; background: var(--accent2); color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: background .15s; }
  .btn-print:hover { background: #1d4ed8; }

  /* ── SCANNER ── */
  .scanner-wrap { max-width: 480px; margin: 0 auto; }
  .scanner-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .scanner-hint { font-size: 13px; color: var(--muted); margin-bottom: 14px; text-align: center; }
  #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; }
  .manual-label { font-size: 12px; color: var(--muted); margin: 16px 0 6px; }
  .manual-row { display: flex; gap: 8px; }
  .manual-row input {
    flex: 1; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; outline: none;
  }
  .manual-row input:focus { border-color: var(--accent2); }
  .manual-row button { padding: 10px 16px; background: var(--accent2); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif; }

  /* ── MODAL ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 300; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    animation: popIn .2s ease;
  }
  @keyframes popIn { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-dot { width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 14px; border: 3px solid rgba(255,255,255,.1); }
  .modal-type { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .modal-name { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .modal-size { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 16px; }
  .modal-strip { height: 4px; border-radius: 2px; width: 60px; margin: 0 auto 16px; }
  .modal-lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .modal-num { font-size: 52px; font-weight: 900; color: var(--text); font-family: 'IBM Plex Mono', monospace; line-height: 1; }
  .modal-unit { font-size: 13px; color: var(--muted); margin: 4px 0 6px; }
  .modal-date { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 20px; }
  .modal-err { font-size: 13px; color: var(--danger); margin: 12px 0 16px; display: none; }
  .modal-close { width: 100%; padding: 12px; background: rgba(255,255,255,.06); border: none; border-radius: 8px; color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif; transition: background .15s; }
  .modal-close:hover { background: rgba(255,255,255,.1); }

  /* ── PRINT ALL BTN ── */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar-title { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .content { padding: 12px; }
    .items-grid { grid-template-columns: 1fr; }
    .print-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .tab { font-size: 11px; padding: 10px 10px; }
    .modal-num { font-size: 40px; }
  }
</style>
</head>

<div class="topbar">

    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-dot" id="modalDot"></div>
    <p class="modal-type" id="modalType"></p>

    <p class="modal-date" id="modalDate"></p>
    <p class="modal-err" id="modalErr"></p>
    <button class="modal-close" onclick="closeModal()">إغلاق</button>

</div>

// ── Build lookup map
const LOOKUP = {};
ITEMS.forEach(i => { LOOKUP[i.sku] = i; });

// ── Build list
const grid = document.getElementById('items-grid');
document.getElementById('cnt-list').textContent = ITEMS.length;
document.getElementById('cnt-print').textContent = ITEMS.length;

function buildCards(list) {
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="icon">🔍</div><p>لا توجد نتائج</p></div>';
    return;
  }
  list.forEach(item => {
    const d = document.createElement('div');
    d.className = 'item-card';
    d.style.setProperty('--item-color', item.hex);
    d.innerHTML = `
      <div class="color-dot" style="background:${item.hex}"></div>
      <div class="item-info">
        <div class="item-type">${item.type} · ${item.sheet}</div>
        <div class="item-name">${item.color}${item.size ? ' <span style="color:var(--muted);font-size:10px">'+item.size+'</span>' : ''}</div>
        <div class="item-sku">${item.sku}</div>
      </div>
      <div class="item-balance">
        <div class="item-num">${item.balance.toLocaleString()}</div>
        <div class="item-unit">وحدة</div>
        <div class="item-date">${item.date}</div>
      </div>`;
    d.onclick = () => showModal(item);
    grid.appendChild(d);
  });
}
buildCards(ITEMS);

function filterItems() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { buildCards(ITEMS); return; }
  buildCards(ITEMS.filter(i =>
    i.color.toLowerCase().includes(q) ||
    i.type.toLowerCase().includes(q) ||
    i.sku.toLowerCase().includes(q) ||
    i.sheet.toLowerCase().includes(q)
  ));
}

// ── Build print QR
const printGrid = document.getElementById('print-grid');
ITEMS.forEach(item => {
  const wrap = document.createElement('div');
  wrap.className = 'print-card';
  wrap.innerHTML = `
    <div class="p-type">${item.type}</div>
    <div class="p-name">${item.color}</div>
    <div class="p-size">${item.size || '—'}</div>
    <div class="qr-wrap" id="qr-${item.sku}"></div>
    <div class="p-sku">${item.sku}</div>
    <div class="p-balance">${item.balance.toLocaleString()}</div>
    <div class="p-date">📅 ${item.date}</div>
    <button class="btn-print" onclick="printQR('${item.sku}','${item.color}','${item.type}')">🖨 طباعة</button>`;
  printGrid.appendChild(wrap);
  setTimeout(() => {
    try {
      new QRCode(document.getElementById('qr-' + item.sku), {
        text: item.sku,
        width: 140, height: 140,
        colorDark: '#0d1117', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {}
  }, 200);
});

// ── Modal
function showModal(item) {
  document.getElementById('modalDot').style.background = item.hex;
  document.getElementById('modalType').textContent = item.type + ' · ' + item.sheet;
  document.getElementById('modalName').textContent = item.color;
  document.getElementById('modalSize').textContent = item.size ? item.size : '';
  document.getElementById('modalStrip').style.background = item.hex;
  document.getElementById('modalNum').textContent = item.balance.toLocaleString();
  document.getElementById('modalDate').textContent = 'آخر تحديث: ' + item.date;
  document.getElementById('modalErr').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}

function lookupAndShow(raw) {
  const sku = raw.trim().toUpperCase();
  const item = LOOKUP[sku];
  if (item) { showModal(item); return; }
  document.getElementById('modalDot').style.background = '#7f1d1d';
  document.getElementById('modalType').textContent = 'خطأ';
  document.getElementById('modalName').textContent = 'كود غير موجود';
  document.getElementById('modalSize').textContent = '';
  document.getElementById('modalStrip').style.background = '#dc2626';
  document.getElementById('modalNum').textContent = '—';
  document.getElementById('modalDate').textContent = '';
  const e = document.getElementById('modalErr');
  e.textContent = '"' + sku + '" غير مسجل في هذا النظام';
  e.style.display = 'block';
  document.getElementById('overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  // استأنف السكانر بعد إغلاق الـ Modal
  scanCooldown = false;
}

// ── Scanner
let scanner = null;
let scannerRunning = false;
let scanCooldown = false;

function startScanner() {
  if (scannerRunning) return;
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 12, qrbox: { width: 220, height: 220 } },
    (decoded) => {
      if (scanCooldown) return;   // تجاهل التكرار
      scanCooldown = true;
      lookupAndShow(decoded);
    },
    () => {}
  ).then(() => {
    scannerRunning = true;
  }).catch(() => {});
}

function stopScanner() {
  if (scanner && scannerRunning) {
    scanner.stop().then(() => {
      scanner = null;
      scannerRunning = false;
    }).catch(() => {
      scanner = null;
      scannerRunning = false;
    });
  }
}

// ── Tab switch
function switchTab(name) {
  ['list','print','scan'].forEach(t => {
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active', t===name);
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
  });
  if (name === 'scan') startScanner();
  else stopScanner();
}

// ── Print single QR
function printQR(sku, color, type) {
  const el = document.getElementById('qr-' + sku);
  if (!el) return;
  const img = el.querySelector('img') || el.querySelector('canvas');
  if (!img) return;
  const src = img.tagName === 'CANVAS' ? img.toDataURL() : img.src;
  const win = window.open('', '_blank', 'width=320,height=420');
  win.document.write(`<html><head><title>QR ${color}</title>
  <style>
    body{font-family:Arial,sans-serif;text-align:center;padding:28px;background:#fff;}
    .type{font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
    .name{font-size:16px;font-weight:900;color:#0d1117;margin-bottom:4px;}
    .sku{font-size:10px;font-family:monospace;color:#6b7280;letter-spacing:1px;margin-top:8px;}
    .zone{font-size:10px;color:#2563eb;font-weight:700;margin-top:4px;}
    img{width:180px;height:180px;}
  </style></head>
  <body>
    <div class="type">${type}</div>
    <div class="name">${color}</div>
    <img src="${src}">
    <div class="sku">${sku}</div>
    <div class="zone">ZONE 3 · Packaging · May 2026</div>
    <script>window.onload=function(){window.print();}<\/script>
  </body></html>`);
  win.document.close();
}
</script>
