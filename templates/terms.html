:root{--bg-deep:#0d1117;--bg-card:#21283a;--bg-hover:#2a3347;--border:#2d3748;--border-light:#3d4f6a;--accent-blue:#3b82f6;--accent-cyan:#06b6d4;--text-main:#e2e8f0;--text-muted:#8b9db8;--text-dim:#4a5568}

*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg-deep);color:var(--text-main);min-height:100vh;overflow-x:hidden}.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.06;pointer-events:none}.blob-1{width:560px;height:560px;background:radial-gradient(circle,#3b82f6,transparent 70%);top:-140px;left:-130px}.blob-2{width:460px;height:460px;background:radial-gradient(circle,#06b6d4,transparent 70%);right:-120px;bottom:-120px}.grid-overlay{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:52px 52px}.topbar{position:sticky;top:0;z-index:5;height:56px;padding:0 20px;background:rgba(13,17,23,.72);backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,.15);display:flex;align-items:center;justify-content:space-between}html.light .topbar{background:rgba(255,255,255,.86)}.topbar-left{display:flex;gap:12px;align-items:center;min-width:0}.back-btn{display:flex;gap:6px;align-items:center;color:var(--accent-cyan);text-decoration:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;border:1px solid rgba(6,182,212,.3);background:rgba(6,182,212,.06);transition:.18s}.back-btn:hover{transform:scale(1.04);background:rgba(6,182,212,.14)}.topbar-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topbar-actions{display:flex;gap:8px}.icon-btn{height:36px;min-width:36px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-card);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s;padding:0 12px}.icon-btn:hover{transform:scale(1.04);background:var(--bg-hover);color:var(--text-main)}.lang-btn{color:var(--accent-cyan);border-color:rgba(6,182,212,.35);background:rgba(6,182,212,.08);font-weight:700}.main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:48px 24px 78px}.hero{text-align:center;margin-bottom:34px}.hero-badge{display:inline-flex;gap:7px;align-items:center;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);border-radius:50px;padding:5px 16px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--accent-cyan);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:18px}.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,8vw,62px);letter-spacing:4px;background:linear-gradient(135deg,#60a5fa,#06b6d4,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}.hero-sub{font-size:14px;color:var(--text-muted);line-height:1.8;max-width:560px;margin:0 auto}.section{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;margin-bottom:16px}html.light .section{background:rgba(255,255,255,.72);border-color:var(--border)}.section-title{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}.content-list{display:grid;gap:12px}.content-item{display:flex;gap:12px;align-items:flex-start;color:var(--text-muted);font-size:13px;line-height:1.75}.dot{width:7px;height:7px;margin-top:8px;border-radius:50%;background:var(--accent-blue);box-shadow:0 0 8px var(--accent-blue);flex:0 0 auto}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px}.btn{border:1px solid rgba(59,130,246,.35);border-radius:10px;background:rgba(59,130,246,.12);color:#bfdbfe;text-decoration:none;padding:10px 16px;font-size:13px;font-weight:700;transition:.18s}.btn:hover{transform:scale(1.04);background:rgba(59,130,246,.22)}@media(max-width:560px){.topbar{padding:0 12px}.topbar-title{display:none}.main{padding:34px 16px 56px}.section{padding:22px}.actions .btn{width:100%;text-align:center}.back-btn span:last-child{display:n const data={"en":{"lang":"횠쨔횠짹횠짢횢혡","back":"Back","title":"Terms of Use","sub":"The basic rules for using EST-iMs safely and responsibly.","section":"User Responsibilities","register":"Create Account","login":"Login","items":["Use only your own account and do not share login credentials with anyone else.","Access is granted after admin approval and may be suspended or removed when needed.","Inventory records, reports, and exports are internal operational data and should be handled carefully.","Unauthorized access attempts, duplicate reserved usernames, or misuse may be blocked by the system."]},"ar":{"lang":"English","back":"횠짹횠짭횢혞횠쨔","title":"횠쨈횠짹횢혞횠쨌 횠짠횢혙횠짠횠쨀횠짧횠짰횠짱횠짠횢혚","sub":"횠짠횢혙횢혗횢혞횠짠횠쨔횠짱 횠짠횢혙횠짙횠쨀횠짠횠쨀횢혡횠짤 횢혙횠짠횠쨀횠짧횠짰횠짱횠짠횢혚 EST-iMs 횠짢횠짙횢혚횠짠횢혛 횢혞횢혚횠쨀횠짚횢혞횢혙횢혡횠짤.","section":"횢혚횠쨀횠짚횢혞횢혙횢혡횠짠횠짧 횠짠횢혙횢혚횠쨀횠짧횠짰횠짱횢혚","register":"횠짜횢혛횠쨈횠짠횠징 횠짯횠쨀횠짠횠짢","login":"횠짧횠쨀횠짭횢혡횢혙 횠짠횢혙횠짱횠짰횢혞횢혙","items":["횠짠횠쨀횠짧횠짰횠짱횢혚 횠짯횠쨀횠짠횠짢횢혘 횢혖횢혗횠쨌 횢혞횢혙횠짠 횠짧횠쨈횠짠횠짹횢혘 횠짢횢혡횠짠횢혛횠짠횠짧 횠짠횢혙횠짱횠짰횢혞횢혙 횢혚횠쨔 횠짙횢혡 횠쨈횠짰횠쨉 횠짖횠짰횠짹.","횢혡횠짧횢혚 횢혚횢혛횠짯 횠짠횢혙횠짱횠짰횢혞횢혙 횠짢횠쨔횠짱 횢혚횢혞횠짠횢혖횢혗횠짤 횠짠횢혙횠짙횠짱횢혚횢혛 횢혞횢혡횢혚횢혘횢혛 횠짜횢혡횢혗횠짠횢혖 횠짠횢혙횠짯횠쨀횠짠횠짢 횠짙횢혞 횠짯횠째횢혖횢혝 횠쨔횢혛횠짱 횠짠횢혙횠짯횠짠횠짭횠짤.","횠쨀횠짭횢혙횠짠횠짧 횠짠횢혙횢혚횠짰횠짼횢혞횢혛 횢혞횠짠횢혙횠짧횢혗횠짠횠짹횢혡횠짹 횢혞횠짠횢혙횠짧횠쨉횠짱횢혡횠짹 횠짢횢혡횠짠횢혛횠짠횠짧 횠짧횠쨈횠쨘횢혡횢혙횢혡횠짤 횠짱횠짠횠짰횢혙횢혡횠짤 횢혞횢혡횠짭횠짢 횠짠횢혙횠짧횠쨔횠짠횢혚횢혙 횢혚횠쨔횢혝횠짠 횠짢횠짯횠째횠짹.","횢혚횠짯횠짠횢혞횢혙횠짠횠짧 횠짠횢혙횠짱횠짰횢혞횢혙 횠쨘횢혡횠짹 횠짠횢혙횢혚횠쨉횠짹횠짯 횠짢횢혝횠짠 횠짙횢혞 횠짠횢혙횠짙횠쨀횢혚횠짠횠징 횠짠횢혙횢혚횠짯횠짭횢혞횠짼횠짤 횠짙횢혞 횠쨀횢혞횠징 횠짠횢혙횠짠횠쨀횠짧횠짰횠짱횠짠횢혚 횢혗횠짱 횢혡횠짧횢혚 횠짯횠쨍횠짹횢혝횠짠 횢혚횢혛 횠짠횢혙횢혛횠쨍횠짠횢혚."]}};
let lang=localStorage.getItem('est-auth-lang')||'en';
function render(){const t=data[lang];document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.getElementById('langBtn').textContent=t.lang;document.getElementById('backText').textContent=t.back;document.getElementById('topTitle').textContent=t.title;document.getElementById('heroTitle').textContent=t.title;document.getElementById('heroSub').textContent=t.sub;document.getElementById('sectionTitle').textContent=t.section;document.getElementById('registerBtn').textContent=t.register;document.getElementById('loginBtn').textContent=t.login;document.getElementById('contentList').innerHTML=t.items.map(function(x){return '<div class="content-item"><span class="dot"></span><span>'+x+'</span></div>';}).join('');}
