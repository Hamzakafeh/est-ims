<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terms of Use — EST-iMs</title>
<link rel="icon" type="image/x-icon" href="/static/icons/low1.ico">
<link rel="stylesheet" href="/static/css/side-dock.css">
<link rel="stylesheet" href="/static/css/terms.css">
<link rel="stylesheet" href="/static/css/theme-classic.css">
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="grid-overlay"></div>

<div class="side-dock">
  <div class="dock-item" onclick="toggleTheme()">
    <div class="dock-icon">
      <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </div>
    <div class="dock-label">Light Mode</div>
  </div>
  <div class="dock-item" onclick="history.back()">
    <div class="dock-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="dock-label">Back</div>
  </div>
  <div class="dock-item" onclick="toggleLang()">
    <div class="dock-icon"><span class="lang-switch-text" id="langDockText">AR</span></div>
    <div class="dock-label" id="langDockLabel">Language</div>
  </div>
</div>

<main class="main">
  <section class="hero">
    <div class="hero-logo"><img src="/static/icons/low.ico" alt="EST-iMs"></div>
    <div class="hero-badge"><span class="hero-dot"></span><span id="badgeText">EST-iMs</span></div>
    <h1 class="hero-title" id="heroTitle">Terms of Use</h1>
    <p class="hero-sub" id="heroSub">The basic rules for using EST-iMs safely and responsibly.</p>
  </section>
  <section class="section">
    <div class="section-title" id="sectionTitle">User Responsibilities</div>
    <div class="content-list" id="contentList"></div>
  </section>
  <div class="actions">
    <a class="btn" href="/register" id="registerBtn">Create Account</a>
    <a class="btn" href="/login" id="loginBtn">Login</a>
  </div>
  <div class="copy-line"><span class="copy-dot"></span><span>Copyright 2026 | All Rights Reserved</span></div>
</main>

<script src="/static/js/terms.js"></script>
<script src="/static/js/theme-switcher.js"></script>
</body>
</html>
