<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EST-iMs | Contact Us</title>
<link rel="icon" type="image/x-icon" href="/static/low.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap');

  :root {
    --bg-deep:      #0d1117;
    --bg-card:      #1c2230;
    --bg-item:      #21283a;
    --bg-hover:     #2a3347;
    --border:       #2d3748;
    --border-light: #3d4f6a;
    --accent-blue:  #3b82f6;
    --accent-cyan:  #06b6d4;
    --accent-green: #10b981;
    --text-main:    #e2e8f0;
    --text-muted:   #8b9db8;
    --text-dim:     #4a5568;
  }
  html.light {
    --bg-deep:      #f0f4f8;
    --bg-card:      #ffffff;
    --bg-item:      #f8fafc;
    --bg-hover:     #e8edf5;
    --border:       #d1dae8;
    --border-light: #b8c6da;
    --accent-blue:  #2563eb;
    --accent-cyan:  #0891b2;
    --accent-green: #059669;
    --text-main:    #1a2332;
    --text-muted:   #4a6080;
    --text-dim:     #8fa3be;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.3s, color 0.3s;
  }

  /* ── PARTICLES ── */
  #particleCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── BLOBS ── */
  .blob { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.06; pointer-events: none; z-index: 0; }
  html.light .blob { opacity: 0.08; }
  .blob-1 { width:700px;height:700px;background:radial-gradient(circle,#3b82f6,transparent 70%);top:-200px;left:-200px;animation:bd1 20s ease-in-out infinite; }
  .blob-2 { width:600px;height:600px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-160px;right:-160px;animation:bd2 24s ease-in-out infinite; }
  .blob-3 { width:450px;height:450px;background:radial-gradient(circle,#6366f1,transparent 70%);top:38%;left:52%;animation:bd3 18s ease-in-out infinite; }
  @keyframes bd1 { 0%,100%{transform:translate(0,0)scale(1);}50%{transform:translate(70px,50px)scale(1.1);} }
  @keyframes bd2 { 0%,100%{transform:translate(0,0)scale(1);}50%{transform:translate(-60px,-40px)scale(1.08);} }
  @keyframes bd3 { 0%,100%{transform:translate(0,0)scale(1);}50%{transform:translate(-50px,60px)scale(1.12);} }

  /* ── GRID ── */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(59,130,246,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.035) 1px,transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(ellipse 75% 75% at 50% 50%,black 30%,transparent 100%);
  }
  html.light .grid-overlay {
    background-image: linear-gradient(rgba(37,99,235,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.05) 1px,transparent 1px);
  }

  /* ── SIDE DOCK ── */
  .side-dock { position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;padding:10px 0; }
  .dock-item { position:relative;display:flex;align-items:center;cursor:pointer;height:44px; }
  .dock-icon {
    width:44px;height:44px;border-radius:0 12px 12px 0;
    background:rgba(28,34,48,0.75);backdrop-filter:blur(14px);
    border:1px solid var(--border-light);border-left:none;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-muted);transition:background 0.2s,color 0.2s;
    position:relative;z-index:2;flex-shrink:0;
  }
  html.light .dock-icon { background:rgba(255,255,255,0.8); }
  .dock-item:hover .dock-icon { background:var(--accent-blue);color:#fff;border-color:var(--accent-blue); }
  .dock-label {
    position:absolute;left:44px;white-space:nowrap;
    font-size:12px;font-weight:600;color:var(--text-main);
    background:rgba(28,34,48,0.85);backdrop-filter:blur(14px);
    border:1px solid var(--border-light);border-left:none;
    border-radius:0 10px 10px 0;padding:0 16px;height:36px;
    display:flex;align-items:center;pointer-events:none;
    opacity:0;transform:translateX(-8px);
    transition:opacity 0.2s,transform 0.2s;z-index:1;
  }
  html.light .dock-label { background:rgba(255,255,255,0.9); }
  .dock-item:hover .dock-label { opacity:1;transform:translateX(0); }
  .dock-icon .icon-sun  { display:block; }
  .dock-icon .icon-moon { display:none;  }
  html.light .dock-icon .icon-sun  { display:none;  }
  html.light .dock-icon .icon-moon { display:block; }

  /* ── MAIN CARD ── */
  .contact-card {
    position: relative; z-index: 10;
    width: min(640px, calc(100vw - 80px));
    padding: 52px 56px 44px;
    background: rgba(28,34,48,0.7);
    backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.07);
    animation: cardIn 0.65s cubic-bezier(.34,1.56,.64,1) both;
  }
  html.light .contact-card {
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(0,0,0,0.07);
    box-shadow: 0 24px 64px rgba(0,0,0,0.1);
  }
  /* top glow line */
  .contact-card::before {
    content:'';position:absolute;top:0;left:10%;right:10%;height:1.5px;
    background:linear-gradient(90deg,transparent,rgba(59,130,246,0.7),rgba(6,182,212,0.6),transparent);
    border-radius:2px;
  }
  @keyframes cardIn {
    from { opacity:0;transform:scale(0.9) translateY(28px);filter:blur(4px); }
    to   { opacity:1;transform:scale(1) translateY(0);filter:blur(0); }
  }

  /* ── HEADER ── */
  .card-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 36px;
  }
  .header-icon {
    width: 52px; height: 52px; border-radius: 15px; flex-shrink: 0;
    background: linear-gradient(135deg,rgba(59,130,246,0.2),rgba(6,182,212,0.12));
    border: 1px solid rgba(59,130,246,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-blue);
    box-shadow: 0 6px 24px rgba(59,130,246,0.2);
  }
  html.light .header-icon { background:linear-gradient(135deg,rgba(37,99,235,0.12),rgba(8,145,178,0.07));border-color:rgba(37,99,235,0.25); }
  .header-text { display:flex;flex-direction:column;gap:3px; }
  .header-chip {
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
    color:var(--accent-cyan);letter-spacing:2.5px;text-transform:uppercase;
  }
  .header-title {
    font-family:'Sora',sans-serif;font-size:24px;font-weight:700;
    color:var(--text-main);line-height:1.1;
  }

  /* ── DIVIDER ── */
  .card-divider {
    height:1px;background:var(--border);margin-bottom:30px;
    background:linear-gradient(90deg,transparent,var(--border-light),transparent);
  }

  /* ── CONTACT ITEMS GRID ── */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 30px;
  }
  .contact-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 18px;
    background: var(--bg-item);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: border-color 0.2s, background 0.2s, transform 0.18s;
    cursor: default;
  }
  .contact-item:hover {
    border-color: var(--accent-blue);
    background: var(--bg-hover);
    transform: translateY(-2px);
  }
  .ci-icon {
    width: 38px; height: 38px; flex-shrink: 0; border-radius: 10px;
    background: linear-gradient(135deg,rgba(59,130,246,0.18),rgba(6,182,212,0.1));
    border: 1px solid rgba(59,130,246,0.2);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-blue);
    margin-top: 1px;
  }
  html.light .ci-icon { background:linear-gradient(135deg,rgba(37,99,235,0.1),rgba(8,145,178,0.06));border-color:rgba(37,99,235,0.18); }
  .ci-text { display:flex;flex-direction:column;gap:3px; }
  .ci-label {
    font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
    color:var(--accent-cyan);letter-spacing:2px;text-transform:uppercase;
  }
  .ci-value {
    font-size:13px;font-weight:500;color:var(--text-main);line-height:1.5;
  }
  .ci-value a { color:inherit;text-decoration:none; }
  .ci-value a:hover { color:var(--accent-blue); }

  /* ── FOLLOW US ── */
  .follow-section { margin-top: 4px; }
  .follow-label {
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
    color:var(--text-dim);letter-spacing:2.5px;text-transform:uppercase;
    margin-bottom:14px;
    display:flex;align-items:center;gap:10px;
  }
  .follow-label::after { content:'';flex:1;height:1px;background:var(--border); }

  .social-row { display:flex;gap:10px; }
  .social-btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--bg-item);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
  }
  .social-btn:hover { transform:translateY(-3px) scale(1.08); color:#fff; border-color:transparent; }
  .social-btn.fb:hover   { background:#1877f2; box-shadow:0 6px 20px rgba(24,119,242,0.4); }
  .social-btn.li:hover   { background:#0a66c2; box-shadow:0 6px 20px rgba(10,102,194,0.4); }
  .social-btn.ig:hover   { background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af); box-shadow:0 6px 20px rgba(221,42,123,0.4); }
  .social-btn.yt:hover   { background:#ff0000; box-shadow:0 6px 20px rgba(255,0,0,0.4); }

  /* ── BACK BUTTON ── */
  .back-btn {
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;color:var(--text-dim);
    background:none;border:none;cursor:pointer;
    padding:0;margin-bottom:28px;
    transition:color 0.18s;font-family:'Inter',sans-serif;
  }
  .back-btn:hover { color:var(--accent-blue); }

  /* ── COPYRIGHT ── */
  .copy-line {
    margin-top:28px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;color:var(--text-dim);
    text-align:center;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .copy-dot {
    width:5px;height:5px;border-radius:50%;
    background:var(--accent-green);
    box-shadow:0 0 6px var(--accent-green);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.65);} }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
</style>
</head>

<script>
// ── THEME ──
(function() {
  if (localStorage.getItem('est-theme') === 'light')
    document.documentElement.classList.add('light');
  updateDockTheme();
})();
function updateDockTheme() {
  const isLight = document.documentElement.classList.contains('light');
  const label = document.getElementById('dockThemeLabel');
  if (label) label.textContent = isLight ? 'Dark Mode' : 'Light Mode';
}
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('est-theme', isLight ? 'light' : 'dark');
  updateDockTheme();
}

// ── PARTICLES ──
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [], mouse = { x:-999, y:-999 };
  const isLight = () => document.documentElement.classList.contains('light');

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function Particle() {
    this.x=Math.random()*W; this.y=Math.random()*H;
    this.vx=(Math.random()-0.5)*0.35; this.vy=(Math.random()-0.5)*0.35;
    this.r=Math.random()*1.6+0.4; this.alpha=Math.random()*0.4+0.08;
  }
  Particle.prototype.update = function() {
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<0)this.x=W; if(this.x>W)this.x=0;
    if(this.y<0)this.y=H; if(this.y>H)this.y=0;
    const dx=this.x-mouse.x, dy=this.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){this.x+=dx/d*1.4; this.y+=dy/d*1.4;}
  };

  function init() {
    resize(); particles=[];
    const n=Math.floor((W*H)/13000);
    for(let i=0;i<n;i++) particles.push(new Particle());
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    const light=isLight();
    const dc=light?'rgba(37,99,235,':'rgba(59,130,246,';
    const md=135;
    for(let i=0;i<particles.length;i++){
      const p=particles[i]; p.update();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=dc+p.alpha+')'; ctx.fill();
      for(let j=i+1;j<particles.length;j++){
        const q=particles[j];
        const dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<md){
          const a=(1-d/md)*0.15*(light?1:0.65);
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=dc+a+')'; ctx.lineWidth=0.6; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener('mouseleave',()=>{mouse.x=-999;mouse.y=-999;});
  init(); draw();
})();
</script>
</body>
</html>
