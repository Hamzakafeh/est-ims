<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EST-iMs | Password Recovery</title>
<link rel="icon" type="image/x-icon" href="/static/low1.ico">
<style>
  :root { --bg:#0d1117; --panel:#1c2230; --card:#21283a; --border:#2d3748; --line:#3d4f6a; --blue:#3b82f6; --cyan:#06b6d4; --green:#10b981; --purple:#8b5cf6; --red:#ef4444; --text:#e2e8f0; --muted:#8b9db8; --dim:#60708a; }
  html.light { --bg:#f0f4f8; --panel:#ffffff; --card:#f8fafc; --border:#d1dae8; --line:#b8c6da; --blue:#2563eb; --cyan:#0891b2; --green:#059669; --purple:#7c3aed; --red:#dc2626; --text:#1a2332; --muted:#4a6080; --dim:#7d8ea8; }
  * { box-sizing:border-box; margin:0; padding:0; } body { min-height:100vh; background:var(--bg); color:var(--text); font-family:Inter,Segoe UI,Arial,sans-serif; }
  .grid-bg { position:fixed; inset:0; pointer-events:none; background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px); background-size:52px 52px; }
  .topbar { position:sticky; top:0; z-index:5; min-height:58px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 20px; background:rgba(13,17,23,.78); border-bottom:1px solid rgba(59,130,246,.16); backdrop-filter:blur(18px); } html.light .topbar { background:rgba(255,255,255,.86); }
  .top-left,.top-actions { display:flex; align-items:center; gap:10px; flex-wrap:wrap; } .back,.icon-btn,.lang-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:38px; border-radius:9px; border:1px solid var(--line); background:var(--card); color:var(--text); padding:0 12px; text-decoration:none; font-weight:700; cursor:pointer; } .back { color:var(--cyan); border-color:rgba(6,182,212,.35); background:rgba(6,182,212,.09); }
  .page { position:relative; z-index:1; width:min(980px,100%); margin:0 auto; padding:30px 18px 54px; } .hero { display:grid; grid-template-columns:1fr .75fr; gap:16px; margin-bottom:16px; } .panel { background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.09); border-radius:14px; backdrop-filter:blur(18px); } html.light .panel { background:rgba(255,255,255,.78); border-color:var(--border); }
  .hero-main,.hero-side,.form-panel { padding:24px; } .logo { width:60px; height:60px; border-radius:16px; display:grid; place-items:center; background:rgba(59,130,246,.13); border:1px solid rgba(59,130,246,.28); margin-bottom:16px; } .logo img { width:38px; height:38px; object-fit:contain; } h1 { font-size:clamp(28px,4.8vw,44px); line-height:1.08; margin-bottom:10px; } .sub,.mini { color:var(--muted); line-height:1.7; font-size:14px; } .mini-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; } .mini-label { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.8px; margin-bottom:7px; font-weight:800; }
  .section-title { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:1px; font-weight:800; margin-bottom:16px; } .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; } .field { display:flex; flex-direction:column; gap:7px; min-width:0; } .field.full { grid-column:1/-1; } label { color:var(--muted); font-size:12px; font-weight:800; } input,select { width:100%; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); padding:12px 13px; font:inherit; outline:none; min-height:44px; } input:focus,select:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(59,130,246,.14); }
  .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; } .btn { border:0; border-radius:10px; padding:12px 16px; font:inherit; font-weight:800; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; min-height:44px; } .primary { background:var(--blue); color:white; } .purple { background:var(--purple); color:white; } .ghost { background:transparent; color:var(--muted); border:1px solid var(--border); } .hidden { display:none; }
  .status { display:none; margin-top:14px; padding:12px 14px; border-radius:10px; line-height:1.6; font-size:13px; } .status.ok { display:block; background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3); color:var(--green); } .status.err { display:block; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red); }
  @media (max-width:800px) { .hero,.form-grid { grid-template-columns:1fr; } .hero-main,.hero-side,.form-panel { padding:20px; } } @media (max-width:560px) { .topbar { padding:10px 12px; } .top-left span { display:none; } .page { padding:20px 12px 42px; } .actions .btn,.back,.lang-btn,.icon-btn { flex:1 1 auto; } }
</style>
</head>
<body>
<div class="grid-bg"></div>
<header class="topbar"><div class="top-left"><a class="back" href="/login" data-i18n="back">Back</a><span data-i18n="topTitle">Password recovery</span></div><div class="top-actions"><button class="lang-btn" type="button" id="langBtn">AR</button><button class="icon-btn" type="button" onclick="toggleTheme()">◐</button></div></header>
<main class="page">
  <section class="hero"><div class="panel hero-main"><div class="logo"><img src="/static/low.ico" alt="EST-iMs"></div><h1 data-i18n="title">Recover password</h1><p class="sub" data-i18n="subtitle">Verify your username and security answer, then set a new password.</p></div><aside class="panel hero-side"><div class="mini-card"><div class="mini-label" data-i18n="step1Label">Step 1</div><div class="mini" data-i18n="step1">Choose the same security question used during registration.</div></div><div class="mini-card"><div class="mini-label" data-i18n="step2Label">Step 2</div><div class="mini" data-i18n="step2">After verification, enter and save the new password.</div></div></aside></section>
  <section class="panel form-panel" id="step1Box"><div class="section-title" data-i18n="verifyTitle">Verify account</div><div class="form-grid"><div class="field"><label data-i18n="username">Username</label><input id="username" dir="ltr" autocomplete="username"></div><div class="field"><label data-i18n="oldPassword">Old password</label><input id="oldPassword" dir="ltr" type="password" autocomplete="current-password"></div><div class="field full"><label data-i18n="securityQuestion">Security question</label><select id="securityQuestion"></select></div><div class="field full"><label data-i18n="securityAnswer">Security answer</label><input id="securityAnswer" dir="auto" autocomplete="off"></div></div><div class="actions"><button class="btn purple" id="verifyBtn" type="button" data-i18n="verify">Verify</button><a class="btn ghost" href="/login" data-i18n="loginBack">Back to login</a></div><div class="status" id="statusBox"></div></section>
  <section class="panel form-panel hidden" id="step2Box"><div class="section-title" data-i18n="changeTitle">Change password</div><div class="form-grid"><div class="field"><label data-i18n="newPassword">New password</label><input id="newPassword" dir="ltr" type="password" autocomplete="new-password"></div><div class="field"><label data-i18n="confirmPassword">Confirm new password</label><input id="confirmPassword" dir="ltr" type="password" autocomplete="new-password"></div></div><div class="actions"><button class="btn primary" id="saveBtn" type="button" data-i18n="save">Save password</button></div><div class="status" id="statusBox2"></div></section>
</main>
<script>
const questions = { en:['What was the name of your first school?','What is your mother\'s maiden name?','What city were you born in?','What is the name of your favorite teacher?','What was your first phone number?'], ar:['ما اسم أول مدرسة التحقت بها؟','ما اسم عائلة والدتك قبل الزواج؟','في أي مدينة ولدت؟','ما اسم معلمك المفضل؟','ما هو أول رقم هاتف استخدمته؟'] };
const i18n = { en:{back:'Back',topTitle:'Password recovery',title:'Recover password',subtitle:'Verify your username and security answer, then set a new password.',step1Label:'Step 1',step1:'Choose the same security question used during registration.',step2Label:'Step 2',step2:'After verification, enter and save the new password.',verifyTitle:'Verify account',username:'Username',oldPassword:'Old password',securityQuestion:'Security question',securityAnswer:'Security answer',verify:'Verify',loginBack:'Back to login',changeTitle:'Change password',newPassword:'New password',confirmPassword:'Confirm new password',save:'Save password',verifyOk:'Verified successfully. Continue to the second step.',verifyError:'Could not verify account',saveOk:'Password changed successfully. You can login now.',saveError:'Could not save password'}, ar:{back:'العودة',topTitle:'استرجاع كلمة المرور',title:'استرجاع كلمة المرور',subtitle:'تحقق من اسم المستخدم والجواب الأمني ثم أدخل كلمة مرور جديدة.',step1Label:'الخطوة 1',step1:'اختر نفس السؤال الأمني المستخدم عند التسجيل.',step2Label:'الخطوة 2',step2:'بعد التحقق أدخل كلمة المرور الجديدة واحفظها.',verifyTitle:'التحقق من الحساب',username:'اسم المستخدم',oldPassword:'كلمة السر القديمة',securityQuestion:'السؤال الأمني',securityAnswer:'الجواب الأمني',verify:'تحقق',loginBack:'العودة للدخول',changeTitle:'تغيير كلمة المرور',newPassword:'كلمة المرور الجديدة',confirmPassword:'تأكيد كلمة المرور الجديدة',save:'حفظ كلمة المرور',verifyOk:'تم التحقق بنجاح. انتقل للمرحلة الثانية.',verifyError:'تعذر التحقق',saveOk:'تم تغيير كلمة المرور بنجاح. يمكنك تسجيل الدخول الآن.',saveError:'تعذر حفظ كلمة المرور'} };
let lang=localStorage.getItem('est-auth-lang')||'en';
function applyLang(){ document.documentElement.lang=lang; document.documentElement.dir=lang==='ar'?'rtl':'ltr'; document.getElementById('langBtn').textContent=lang==='ar'?'EN':'AR'; document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=i18n[lang][el.dataset.i18n]||el.textContent;}); const sel=document.getElementById('securityQuestion'); const current=sel.value; sel.innerHTML=questions[lang].map(q=>`<option value="${q}">${q}</option>`).join(''); if(questions[lang].includes(current)) sel.value=current; }
document.getElementById('langBtn').addEventListener('click',()=>{lang=lang==='ar'?'en':'ar'; localStorage.setItem('est-auth-lang',lang); applyLang();});
(function(){ if(localStorage.getItem('est-theme')==='light') document.documentElement.classList.add('light'); })(); function toggleTheme(){ const isLight=document.documentElement.classList.toggle('light'); localStorage.setItem('est-theme',isLight?'light':'dark'); }
function setStatus(id,msg,ok){ const box=document.getElementById(id); box.className='status '+(ok?'ok':'err'); box.textContent=msg; }
document.getElementById('verifyBtn').addEventListener('click',async()=>{ const payload={username:username.value.trim(),old_password:oldPassword.value,security_question:securityQuestion.value,security_answer:securityAnswer.value.trim()}; try{ const res=await fetch('/api/password_reset/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const data=await res.json(); if(!res.ok||!data.success) throw new Error(data.message||i18n[lang].verifyError); setStatus('statusBox',i18n[lang].verifyOk,true); step2Box.classList.remove('hidden'); step2Box.scrollIntoView({behavior:'smooth',block:'start'}); }catch(err){ setStatus('statusBox',err.message||i18n[lang].verifyError,false); }});
document.getElementById('saveBtn').addEventListener('click',async()=>{ const payload={new_password:newPassword.value,confirm_password:confirmPassword.value}; try{ const res=await fetch('/api/password_reset/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const data=await res.json(); if(!res.ok||!data.success) throw new Error(data.message||i18n[lang].saveError); setStatus('statusBox2',i18n[lang].saveOk,true); setTimeout(()=>window.location.href='/login',1400); }catch(err){ setStatus('statusBox2',err.message||i18n[lang].saveError,false); }});
applyLang();
</script>
</body>
</html>
