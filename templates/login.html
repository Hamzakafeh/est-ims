<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>EST-iMs | Login</title>
<link rel="icon" type="image/x-icon" href="/static/icons/low1.ico">
<link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

<!-- PROGRESS BAR -->
<div class="progress-bar" id="progressBar"></div>

<!-- PARTICLES -->
<canvas id="particleCanvas"></canvas>

<!-- BLOBS -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- GRID -->
<div class="grid-overlay"></div>

<!-- SIDE DOCK -->
<div class="side-dock">

  <div class="dock-item" onclick="window.location.href='/'">
    <div class="dock-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="dock-label" id="dockBackLabel">Back</div>
  </div>

  <div class="dock-item" onclick="toggleTheme()">
    <div class="dock-icon" id="themeBtn">
      <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </div>
    <div class="dock-label" id="dockThemeLabel">Light Mode</div>
  </div>

  <div class="dock-item" onclick="toggleLoginLang()">
    <div class="dock-icon">
      <span class="lang-switch-text" id="loginLangText">AR</span>
    </div>
    <div class="dock-label" id="loginLangLabel">عربي</div>
  </div>

</div>

<!-- LOGIN CARD -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Title -->
    <div class="login-title" id="loginTitle">EST Inventory System</div>

    <!-- Error -->
    <div class="error-box hidden" id="errorBox">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">Incorrect username or password</span>
    </div>

    <!-- Username -->
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
    </div>

    <!-- Password -->
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <button class="pw-toggle" type="button" id="pwToggle" title="Show/hide password">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <!-- Forgot password -->
    <div class="login-forgot-row">
      <a class="login-link-disabled" id="loginLinkForgot" href="/forgot-password">Forgot password?</a>
    </div>

    <!-- Submit -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Sign In</span>
    </button>

    <!-- Sign up -->
    <div class="login-signup-row">
      <span class="login-no-account" id="loginNoAccount">Don't Have An Account?</span>
      <a class="login-link-signup" id="loginLinkSignup" href="/register">Sign Up</a>
    </div>

  </div>
</div>

<div class="login-alert-overlay" id="loginAlertModal" onclick="if(event.target===this)closeLoginAlert()">
  <div class="login-alert-box">
    <div class="login-alert-icon">!</div>
    <div class="login-alert-title" id="loginAlertTitle">Access warning</div>
    <div class="login-alert-text" id="loginAlertText">This account cannot be used here.</div>
    <button class="login-alert-btn" type="button" onclick="closeLoginAlert()">OK</button>
    <button class="login-alert-btn" type="button" id="forceLogoutBtn" style="display:none;margin-top:8px;background:linear-gradient(135deg,#ef4444,#dc2626);" onclick="forceLogoutOther()">تسجيل خروج من الجهاز الآخر والدخول هنا</button>
  </div>
</div>
<script src="/static/js/login.js"></script>
</body>
</html>
