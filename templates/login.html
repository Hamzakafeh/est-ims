<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>EST-IMS® — Login</title>
<link rel="icon" type="image/x-icon" href="/static/low.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ── DARK (default) ── */
  :root {
    --bg-deep:      #0d1117;
    --bg-main:      #161b22;
    --bg-panel:     #1c2230;
    --bg-card:      #21283a;
    --bg-hover:     #2a3347;
    --border:       #2d3748;
    --border-light: #3d4f6a;
    --accent-blue:  #3b82f6;
    --accent-cyan:  #06b6d4;
    --accent-green: #10b981;
    --accent-red:   #ef4444;
    --text-main:    #e2e8f0;
    --text-muted:   #8b9db8;
    --text-dim:     #4a5568;
    --shadow:       0 4px 24px rgba(0,0,0,0.4);
    --card-shadow:  0 12px 48px rgba(0,0,0,0.7);
  }

  /* ── LIGHT ── */
  html.light {
    --bg-deep:      #f0f4f8;
    --bg-main:      #ffffff;
    --bg-panel:     #ffffff;
    --bg-card:      #f8fafc;
    --bg-hover:     #e8edf5;
    --border:       #d1dae8;
    --border-light: #b8c6da;
    --accent-blue:  #2563eb;
    --accent-cyan:  #0891b2;
    --accent-green: #059669;
    --accent-red:   #dc2626;
    --text-main:    #1a2332;
    --text-muted:   #4a6080;
    --text-dim:     #8fa3be;
    --shadow:       0 4px 24px rgba(0,0,0,0.08);
    --card-shadow:  0 12px 48px rgba(0,0,0,0.10);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, color 0.25s;
    position: relative;
    overflow: hidden;
  }

  /* ── AMBIENT BLOBS ── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(90px); opacity: 0.06;
    pointer-events: none; z-index: 0;
  }
  html.light .blob { opacity: 0.08; }
  .blob-1 {
    width: 700px; height: 700px;
    background: radial-gradient(circle, #3b82f6, transparent 70%);
    top: -200px; left: -200px;
    animation: bd1 20s ease-in-out infinite;
  }
  .blob-2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #06b6d4, transparent 70%);
    bottom: -160px; right: -160px;
    animation: bd2 24s ease-in-out infinite;
  }
  .blob-3 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, #6366f1, transparent 70%);
    top: 38%; left: 52%;
    animation: bd3 18s ease-in-out infinite;
  }
  @keyframes bd1 { 0%,100%{transform:translate(0,0)scale(1);} 50%{transform:translate(70px,50px)scale(1.1);} }
  @keyframes bd2 { 0%,100%{transform:translate(0,0)scale(1);} 50%{transform:translate(-60px,-40px)scale(1.08);} }
  @keyframes bd3 { 0%,100%{transform:translate(0,0)scale(1);} 50%{transform:translate(-50px,60px)scale(1.12);} }

  /* ── GRID ── */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 30%, transparent 100%);
  }
  html.light .grid-overlay {
    background-image:
      linear-gradient(rgba(37,99,235,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px);
  }

  /* ── THEME BTN (corner) ── */
  .theme-btn {
    position: fixed; top: 22px; right: 22px; z-index: 100;
    width: 40px; height: 40px; border-radius: 11px;
    border: 1px solid var(--border-light);
    background: rgba(28,34,48,0.6);
    backdrop-filter: blur(12px);
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s, color 0.18s, transform 0.18s;
  }
  html.light .theme-btn { background: rgba(255,255,255,0.7); }
  .theme-btn:hover { color: var(--text-main); transform: rotate(18deg); }
  .theme-btn .icon-sun  { display: block; }
  .theme-btn .icon-moon { display: none;  }
  html.light .theme-btn .icon-sun  { display: none;  }
  html.light .theme-btn .icon-moon { display: block; }

  /* CENTER LOGIN CARD */
  .login-wrapper {
    position: relative; z-index: 10;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── PARTICLES CANVAS ── */
  #particleCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan), var(--accent-blue));
    background-size: 200% 100%;
    border-radius: 0 2px 2px 0;
    z-index: 9999;
    animation: progressShimmer 1.5s linear infinite;
    display: none;
  }
  @keyframes progressShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── FROSTED GLASS CARD ── */
  .login-card {
    background: rgba(28, 34, 48, 0.72);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 44px 48px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: cardIn 0.45s cubic-bezier(.34,1.56,.64,1);
    transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
    position: relative;
  }
  html.light .login-card {
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 24px 64px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.6), rgba(6,182,212,0.6), transparent);
    border-radius: 1px;
  }

  @keyframes cardIn {
    from { opacity:0; transform: scale(0.88) translateY(24px); filter: blur(4px); }
    to   { opacity:1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  /* ── SHAKE ANIMATION ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15%      { transform: translateX(-8px) rotate(-0.5deg); }
    30%      { transform: translateX(7px)  rotate(0.5deg); }
    45%      { transform: translateX(-6px); }
    60%      { transform: translateX(5px); }
    75%      { transform: translateX(-3px); }
    90%      { transform: translateX(2px); }
  }
  .login-card.shake {
    animation: shake 0.55s cubic-bezier(.36,.07,.19,.97) both;
  }

  /* ── WELCOME MESSAGE ── */
  .welcome-msg {
    text-align: center;
    font-size: 12px;
    color: var(--accent-cyan);
    margin-bottom: 6px;
    opacity: 0.85;
    letter-spacing: 0.3px;
    animation: fadeSlideIn 0.6s ease 0.2s both;
  }
  @keyframes fadeSlideIn {
    from { opacity:0; transform: translateY(-8px); }
    to   { opacity:0.85; transform: translateY(0); }
  }

  /* ── FIELD ICON FOCUS GLOW ── */
  .field-icon { transition: color 0.2s, transform 0.2s; }
  .field-wrap:focus-within .field-icon { color: var(--accent-blue); transform: translateY(-50%) scale(1.15); }

  .login-logo {
    width: 64px; height: 64px;
    margin: 0 auto 24px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    overflow: hidden;
  }
  .login-logo img { width:100%; height:100%; object-fit:contain; border-radius:16px; }

  .login-title {
    text-align: center;
    font-size: 18px; font-weight: 700;
    color: var(--text-main);
    margin-bottom: 4px;
  }
  .login-subtitle {
    text-align: center;
    font-size: 11px; color: var(--accent-cyan);
    letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 32px;
  }

  .divider { height:1px; background: var(--border); margin-bottom: 28px; transition: background 0.25s; }

  .field-label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.8px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field-wrap {
    position: relative;
    margin-bottom: 18px;
  }
  .field-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
    display: flex; align-items: center;
  }
  .field-wrap input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; color: var(--text-main);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.25s, color 0.25s;
  }
  .field-wrap input::placeholder { color: var(--text-dim); }
  .field-wrap input:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  html.light .field-wrap input:focus {
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }

  /* password toggle */
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); display: flex; align-items: center;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--text-muted); }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--accent-blue);
    color: #fff;
    border: none; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
    position: relative; overflow: hidden;
  }
  .btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-login:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.45), 0 0 0 1px rgba(59,130,246,0.3); }
  .btn-login:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
  .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-login.success { background: var(--accent-green) !important; transform: none !important; box-shadow: 0 4px 20px rgba(16,185,129,0.4) !important; }

  /* error box */
  .error-box {
    display: none;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.35);
    border-radius: 9px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 12px; color: #ef4444;
    display: flex; align-items: center; gap: 8px;
  }
  html:not(.light) .error-box { color: #fca5a5; }
  .error-box.hidden { display: none !important; }

  /* spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .version-tag {
    display: block; text-align: center;
    margin-top: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div class="progress-bar" id="progressBar"></div>

<!-- PARTICLES -->
<canvas id="particleCanvas"></canvas>

<!-- BLOBS -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- GRID -->
<div class="grid-overlay"></div>

<!-- THEME TOGGLE (corner) -->
<button class="theme-btn" id="themeBtn" title="Toggle light/dark mode">
  <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
  <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<!-- LOGIN CARD -->
<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <img src="/static/low.ico" onerror="this.style.display='none'">
    </div>

    <div class="login-title">EST Inventory System</div>
    <div class="welcome-msg" id="welcomeMsg">Good morning ☀️</div>
    <div class="login-subtitle">Limited Access</div>
    <div class="divider"></div>

    <!-- Error -->
    <div class="error-box hidden" id="errorBox">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg">اسم المستخدم أو كلمة المرور غير صحيحة</span>
    </div>

    <!-- Username -->
    <label class="field-label">Username</label>
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
    </div>

    <!-- Password -->
    <label class="field-label">Password</label>
    <div class="field-wrap">
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      <button class="pw-toggle" type="button" id="pwToggle" title="Show/hide password">
        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <!-- Submit -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Sign In</span>
    </button>

    <span class="version-tag">v3.0 — 2026</span>
  </div>
</div>

<script>
// ── THEME ──
(function() {
  const saved = localStorage.getItem('est-theme');
  if (saved === 'light') document.documentElement.classList.add('light');
})();

document.getElementById('themeBtn').addEventListener('click', function() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('est-theme', isLight ? 'light' : 'dark');
});

// ── WELCOME MESSAGE ──
(function() {
  const h = new Date().getHours();
  const el = document.getElementById('welcomeMsg');
  if (h >= 5 && h < 12)      el.textContent = 'Good morning ☀️';
  else if (h >= 12 && h < 17) el.textContent = 'Good afternoon 🌤️';
  else if (h >= 17 && h < 21) el.textContent = 'Good evening 🌆';
  else                         el.textContent = 'Good night 🌙';
})();

// ── PASSWORD TOGGLE ──
document.getElementById('pwToggle').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

// ── ENTER KEY ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// ── PROGRESS BAR ──
function startProgress() {
  const bar = document.getElementById('progressBar');
  bar.style.display = 'block';
  bar.style.transition = 'none';
  bar.style.width = '0%';
  setTimeout(() => {
    bar.style.transition = 'width 1.8s ease';
    bar.style.width = '85%';
  }, 10);
}
function finishProgress(success) {
  const bar = document.getElementById('progressBar');
  bar.style.transition = 'width 0.3s ease';
  bar.style.width = '100%';
  if (success) bar.style.background = 'linear-gradient(90deg,#10b981,#34d399)';
  else bar.style.background = 'linear-gradient(90deg,#ef4444,#f87171)';
  setTimeout(() => {
    bar.style.opacity = '0';
    bar.style.transition = 'opacity 0.4s';
    setTimeout(() => {
      bar.style.display = 'none';
      bar.style.opacity = '1';
      bar.style.background = '';
    }, 400);
  }, 500);
}

// ── SHAKE CARD ──
function shakeCard() {
  const card = document.querySelector('.login-card');
  card.classList.remove('shake');
  void card.offsetWidth; // reflow
  card.classList.add('shake');
  setTimeout(() => card.classList.remove('shake'), 600);
}

// ── LOGIN ──
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorBox = document.getElementById('errorBox');
  const spinner  = document.getElementById('spinner');
  const btnText  = document.getElementById('btnText');
  const loginBtn = document.getElementById('loginBtn');

  errorBox.classList.add('hidden');

  if (!username || !password) {
    showError('Please enter your username and password.     ');
    shakeCard();
    return;
  }

  startProgress();
  spinner.style.display = 'block';
  btnText.textContent = 'Signing in...';
  loginBtn.disabled = true;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      finishProgress(true);
      btnText.textContent = '✓ Success';
      spinner.style.display = 'none';
      loginBtn.classList.add('success');
      setTimeout(() => { window.location.replace('/index'); }, 600);
    } else {
      finishProgress(false);
      showError(data.message || '  Incorrect username or password    ');
      shakeCard();
      resetBtn();
    }
  } catch(e) {
    finishProgress(false);
    showError('Connection error. Please try again.');
    shakeCard();
    resetBtn();
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.classList.remove('hidden');
  box.style.display = 'flex';
}

function resetBtn() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btnText').textContent = 'Sign In';
  document.getElementById('loginBtn').disabled = false;
}

// ── PARTICLES ──
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [], mouse = { x: -999, y: -999 };
  const isLight = () => document.documentElement.classList.contains('light');

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.r  = Math.random() * 1.8 + 0.4;
    this.alpha = Math.random() * 0.5 + 0.1;
  }

  Particle.prototype.update = function() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = W;
    if (this.x > W) this.x = 0;
    if (this.y < 0) this.y = H;
    if (this.y > H) this.y = 0;
    // mouse repel
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 100) {
      this.x += dx / dist * 1.2;
      this.y += dy / dist * 1.2;
    }
  };

  function init() {
    resize();
    particles = [];
    const count = Math.floor((W * H) / 14000);
    for (let i = 0; i < count; i++) particles.push(new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const light = isLight();
    const dotColor   = light ? 'rgba(37,99,235,'   : 'rgba(59,130,246,';
    const lineColor  = light ? 'rgba(37,99,235,'   : 'rgba(59,130,246,';
    const maxDist = 130;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.update();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = dotColor + p.alpha + ')';
      ctx.fill();

      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const dx = p.x - q.x, dy = p.y - q.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < maxDist) {
          const a = (1 - d / maxDist) * 0.18 * (light ? 1 : 0.7);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = lineColor + a + ')';
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });
  init();
  draw();
})();
</script>
</body>
</html>
