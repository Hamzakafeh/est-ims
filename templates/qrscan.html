<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EST-iMs | QR Scan</title>
<link rel="icon" type="image/x-icon" href="/static/icons/low1.ico">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link rel="stylesheet" href="/static/css/side-dock.css">
<link rel="stylesheet" href="/static/css/qrscan.css">
<link rel="stylesheet" href="/static/css/light-mode.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="grid-overlay"></div>

<div class="side-dock">
  <div class="dock-item" onclick="toggleTheme()">
    <div class="dock-icon">
      <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </div>
    <div class="dock-label">Light Mode</div>
  </div>
  <div class="dock-item" onclick="history.back()">
    <div class="dock-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="dock-label">Back</div>
  </div>
  <div class="dock-item" onclick="toggleScanLang()">
    <div class="dock-icon"><span class="lang-switch-text" id="langDockText">AR</span></div>
    <div class="dock-label" id="langDockLabel">عربي</div>
  </div>
</div>

<main class="main">
  <section class="scan-shell">
    <div class="hero">
      <div class="hero-logo"><img src="/static/icons/low.ico" alt="EST-iMs"></div>
      <div class="hero-badge"><span class="hero-dot"></span><span id="badgeText">Live Inventory Lookup</span></div>
      <div class="hero-title" id="heroTitle">QR SCAN</div>
      <p class="hero-sub" id="heroSub">Scan an inventory QR code to retrieve the latest stock balance directly from EST-iMs.</p>
    </div>

    <div class="panel">
      <div id="state-ready">
        <button class="scan-btn" onclick="startCamera()" aria-label="Scan QR">
          <svg class="scan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M16 16h2v2"/><path d="M21 16v5h-5"/><path d="M12 7h1"/><path d="M12 17h1"/><path d="M7 12h10"/></svg>
          <span class="scan-label" id="scanLabel">Scan QR</span>
        </button>
        <p class="hint" id="hintText">Tap to open the camera and scan a stock code.</p>
      </div>
      <div id="state-scanning">
        <div id="reader"></div>
        <button class="cancel-btn" onclick="stopCamera()" id="cancelBtn">Cancel</button>
      </div>
      <div id="state-loading">
        <div class="spinner"></div>
        <p class="loading-text" id="loadingText">Retrieving live data...</p>
      </div>
      <div id="state-result">
        <div class="result-card">
          <div class="result-color-bar" id="resBar"></div>
          <div class="result-body">
            <p class="result-cat">Stocktaking</p>
            <p class="result-name" id="resName"></p>
            <p class="result-balance-label" id="balanceLabel">Current balance</p>
            <p class="result-balance" id="resBalance"></p>
            <p class="result-unit" id="resultUnit">Unit</p>
            <p class="result-date" id="resDate"></p>
            <p class="result-sku" id="resSku"></p>
          </div>
        </div>
        <button class="scan-again-btn" onclick="reset()" id="scanAgainBtn">Scan another code</button>
      </div>
      <div id="state-error">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <p class="error-msg" id="errMsg"></p>
        <button class="retry-btn" onclick="reset()" id="retryBtn">Try again</button>
      </div>
    </div>
  </section>
  <div class="copy-line"><span class="copy-dot"></span><span>Copyright 2026 | All Rights Reserved</span></div>
</main>

<script src="/static/js/qrscan.js"></script>
<script src="/static/js/account-status.js"></script>
</body>
</html>
