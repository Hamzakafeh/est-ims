<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>فحص QR — EST</title>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    color: #475569;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* ── حالة: جاهز للسكان ── */
  #state-ready {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 320px;
  }

  .scan-btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1e3a5f, #1a3a5c);
    border: 3px solid #2a5a8c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 40px rgba(26, 58, 92, 0.6);
  }
  .scan-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(26,58,92,0.8); }
  .scan-btn:active { transform: scale(0.97); }

  .scan-icon { font-size: 48px; line-height: 1; }
  .scan-label { font-size: 14px; font-weight: 700; color: #a0c4e8; }

  .hint { font-size: 12px; color: #475569; text-align: center; }

  /* ── حالة: الكاميرا شغالة ── */
  #state-scanning {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 360px;
  }

  #reader {
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    border: 2px solid #1a3a5c;
  }

  .cancel-btn {
    padding: 10px 28px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .cancel-btn:hover { background: #263345; }

  /* ── حالة: تحميل ── */
  #state-loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #1e3a5f;
    border-top-color: #a0c4e8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: #475569; }

  /* ── حالة: النتيجة ── */
  #state-result {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 320px;
  }

  .result-card {
    width: 100%;
    background: #1e293b;
    border-radius: 20px;
    border: 1px solid #334155;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .result-color-bar {
    height: 8px;
    width: 100%;
  }

  .result-body {
    padding: 24px 20px 20px;
    text-align: center;
  }

  .result-cat {
    font-size: 11px;
    color: #475569;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .result-name {
    font-size: 18px;
    font-weight: 700;
    color: #e2e8f0;
    margin-bottom: 24px;
  }

  .result-balance-label {
    font-size: 11px;
    color: #475569;
    margin-bottom: 4px;
  }

  .result-balance {
    font-size: 64px;
    font-weight: 900;
    color: #e2e8f0;
    line-height: 1;
    margin-bottom: 4px;
  }

  .result-unit {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 12px;
  }

  .result-date {
    font-size: 11px;
    color: #334155;
  }

  .result-sku {
    font-size: 10px;
    font-family: monospace;
    color: #334155;
    letter-spacing: 1px;
    margin-top: 4px;
    direction: ltr;
  }

  .scan-again-btn {
    width: 100%;
    padding: 14px;
    background: #1a3a5c;
    color: #a0c4e8;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .scan-again-btn:hover { background: #24527d; }

  /* ── حالة: خطأ ── */
  #state-error {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
    max-width: 300px;
  }

  .error-icon { font-size: 48px; }
  .error-msg { font-size: 14px; color: #f87171; }
  .retry-btn {
    padding: 10px 28px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .retry-btn:hover { background: #263345; }
</style>
</head>
<body>

<div class="logo">EST · Inventory</div>

<!-- حالة 1: جاهز -->
<div id="state-ready">
  <button class="scan-btn" onclick="startCamera()">
    <span class="scan-icon">📷</span>
    <span class="scan-label">افحص QR</span>
  </button>
  <p class="hint">اضغط لفتح الكاميرا ومسح كود الشوال</p>
</div>

<!-- حالة 2: الكاميرا شغالة -->
<div id="state-scanning">
  <div id="reader"></div>
  <button class="cancel-btn" onclick="stopCamera()">إلغاء</button>
</div>

<!-- حالة 3: تحميل -->
<div id="state-loading">
  <div class="spinner"></div>
  <p class="loading-text">جاري جلب البيانات…</p>
</div>

<!-- حالة 4: النتيجة -->
<div id="state-result">
  <div class="result-card">
    <div class="result-color-bar" id="resBar"></div>
    <div class="result-body">
      <p class="result-cat">شوالات الجاج</p>
      <p class="result-name" id="resName"></p>
      <p class="result-balance-label">الرصيد الحالي</p>
      <p class="result-balance" id="resBalance"></p>
      <p class="result-unit">شوال</p>
      <p class="result-date" id="resDate"></p>
      <p class="result-sku" id="resSku"></p>
    </div>
  </div>
  <button class="scan-again-btn" onclick="reset()">🔁 فحص كود آخر</button>
</div>

<!-- حالة 5: خطأ -->
<div id="state-error">
  <span class="error-icon">⚠️</span>
  <p class="error-msg" id="errMsg"></p>
  <button class="retry-btn" onclick="reset()">حاول مرة أخرى</button>
</div>

<script>
let scanner = null;

function showState(name) {
  ['ready','scanning','loading','result','error'].forEach(s => {
    const el = document.getElementById('state-' + s);
    el.style.display = (s === name) ? 'flex' : 'none';
  });
}

function startCamera() {
  showState('scanning');
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 12, qrbox: { width: 240, height: 240 } },
    (decoded) => {
      stopCamera();
      handleScanned(decoded);
    },
    () => {}
  ).catch(err => {
    showError('تعذّر فتح الكاميرا. تأكد من منح الإذن.');
  });
}

function stopCamera() {
  if (scanner) {
    scanner.stop().catch(() => {});
    scanner = null;
  }
}

function handleScanned(raw) {
  // استخرج الـ SKU من URL أو من النص مباشرة
  let sku = raw.trim().toUpperCase();
  try {
    const url = new URL(raw);
    const fromParam = url.searchParams.get('sku');
    if (fromParam) sku = fromParam.trim().toUpperCase();
  } catch(e) {}

  showState('loading');
  fetch('/api/qrscan/' + encodeURIComponent(sku))
    .then(r => r.json())
    .then(data => {
      if (data.found) showResult(data);
      else showError(data.error || 'الكود غير موجود في النظام');
    })
    .catch(() => showError('تعذّر الاتصال بالسيرفر'));
}

function showResult(data) {
  document.getElementById('resBar').style.background = data.hex || '#1a3a5c';
  const category = data.category || 'Stocktaking';
  const name = data.nameAr || data.color || data.sku;
  document.querySelector('.result-cat').textContent = category;
  document.getElementById('resName').textContent = name;
  const balance = Number(data.balance);
  document.getElementById('resBalance').textContent = Number.isFinite(balance) ? balance.toLocaleString() : data.balance;
  document.getElementById('resDate').textContent = 'آخر تحديث: ' + (data.date || '—');
  document.getElementById('resSku').textContent = data.sku;
  showState('result');
}

function showError(msg) {
  document.getElementById('errMsg').textContent = msg;
  showState('error');
}

function reset() {
  stopCamera();
  showState('ready');
}

// ── إذا جاء من QR مع SKU في الـ URL، افحصه مباشرة ──
(function() {
  const params = new URLSearchParams(window.location.search);
  const sku = params.get('sku');
  if (sku) {
    handleScanned(sku);
  }
})();
</script>
</body>
</html>
