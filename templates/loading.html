<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EST-iMs® | Loading</title>
<link rel="icon" type="image/x-icon" href="/static/low.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap');

  :root {
    --bg-deep:      #0d1117;
    --bg-card:      #21283a;
    --bg-hover:     #2a3347;
    --border:       #2d3748;
    --border-light: #3d4f6a;
    --accent-blue:  #3b82f6;
    --accent-cyan:  #06b6d4;
    --accent-green: #10b981;
    --text-main:    #e2e8f0;
    --text-muted:   #8b9db8;
    --text-dim:     #4a5568;
  }
  html.light {
    --bg-deep:      #f0f4f8;
    --bg-card:      #f8fafc;
    --bg-hover:     #e8edf5;
    --border:       #d1dae8;
    --border-light: #b8c6da;
    --accent-blue:  #2563eb;
    --accent-cyan:  #0891b2;
    --accent-green: #059669;
    --text-main:    #1a2332;
    --text-muted:   #4a6080;
    --text-dim:     #8fa3be;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.3s, color 0.3s;
  }

  /* ── PARTICLES ── */
  #particleCanvas {
    position: fixed; inset: 0;
    z-index: 0; pointer-events: none;
  }

  /* ── AMBIENT BLOBS ── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(90px); opacity: 0.06;
    pointer-events: none; z-index: 0;
  }
  html.light .blob { opacity: 0.08; }
  .blob-1 {
    width: 700px; height: 700px;
    background: radial-gradient(circle, #3b82f6, transparent 70%);
    top: -200px; left: -200px;
    animation: bd1 20s ease-in-out infinite;
  }
  .blob-2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #06b6d4, transparent 70%);
    bottom: -160px; right: -160px;
    animation: bd2 24s ease-in-out infinite;
  }
  .blob-3 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, #6366f1, transparent 70%);
    top: 38%; left: 52%;
    animation: bd3 18s ease-in-out infinite;
  }
  @keyframes bd1 { 0%,100%{transform:translate(0,0)scale(1);} 50%{transform:translate(70px,50px)scale(1.1);} }
  @keyframes bd2 { 0%,100%{transform:translate(0,0)scale(1);} 50%{transform:translate(-60px,-40px)scale(1.08);} }
  @keyframes bd3 { 0%,100%{transform:translate(0,0)scale(1);} 50%{transform:translate(-50px,60px)scale(1.12);} }

  /* ── GRID ── */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
    background-size: 52px 52px;
    mask-image: radial-gradient(ellipse 75% 75% at 50% 50%, black 30%, transparent 100%);
  }
  html.light .grid-overlay {
    background-image:
      linear-gradient(rgba(37,99,235,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(37,99,235,0.05) 1px, transparent 1px);
  }

  /* ── PAGE CONTENT ── */
  .page {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 40px 24px; width: 100%;
  }

  /* ── LOGO ── */
  .logo-wrap {
    width: 76px; height: 76px; border-radius: 22px;
    background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(6,182,212,0.12));
    border: 1px solid rgba(59,130,246,0.25);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 8px 36px rgba(59,130,246,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: logoFloat 4s ease-in-out infinite, fadeUp 0.6s ease 0.1s both;
  }
  html.light .logo-wrap {
    background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(8,145,178,0.07));
    border-color: rgba(37,99,235,0.2);
    box-shadow: 0 8px 28px rgba(37,99,235,0.13);
  }
  .logo-wrap img { width: 46px; height: 46px; object-fit: contain; border-radius: 12px; }
  @keyframes logoFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

  /* ── STATUS CHIP ── */
  .status-chip {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent-cyan);
    letter-spacing: 3.5px; text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0; animation: fadeUp 0.5s ease 0.3s both;
  }
  .status-chip::before, .status-chip::after {
    content: ''; display: block;
    width: 36px; height: 1px;
    background: var(--accent-cyan); opacity: 0.35;
  }

  /* ── BRAND NAME ── */
  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 9vw, 96px);
    font-weight: 400; line-height: 1;
    letter-spacing: 10px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #60a5fa 0%, #06b6d4 35%, #818cf8 70%, #60a5fa 100%);
    background-size: 250% 250%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 6s ease infinite;
    display: flex; align-items: center; justify-content: center;
    min-height: 1.15em;
  }
  html.light .brand-name {
    background: linear-gradient(135deg, #1d4ed8 0%, #0891b2 35%, #4f46e5 70%, #1d4ed8 100%);
    background-size: 250% 250%;
    -webkit-background-clip: text; background-clip: text;
    animation: gradShift 6s ease infinite;
  }
  @keyframes gradShift { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }

  .brand-text-inner { display: inline; }

  /* blinking cursor */
  .type-cursor {
    display: inline-block;
    width: 4px; height: 0.72em;
    margin-left: 5px;
    vertical-align: middle;
    border-radius: 2px;
    background: #60a5fa;
    animation: cursorBlink 0.85s step-end infinite;
    flex-shrink: 0;
  }
  html.light .type-cursor { background: #2563eb; }
  @keyframes cursorBlink { 0%,100%{opacity:1;} 50%{opacity:0;} }

  .brand-suffix {
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 4px; text-transform: uppercase;
    margin-bottom: 48px;
    opacity: 0; animation: fadeUp 0.5s ease 0.45s both;
  }

  /* ── DEVELOPER CREDIT ── */
  .dev-credit {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    margin-top: 10px;
    display: flex; align-items: center; gap: 8px;
    justify-content: center;
    opacity: 0; animation: fadeUp 0.5s ease 0.95s both;
  }
  .dev-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #ef4444;
    box-shadow: 0 0 7px #ef4444;
    animation: devPulse 2.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes devPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.65);} }
  .dev-name {
    cursor: pointer;
    transition: color 0.2s, text-decoration-color 0.2s;
    text-decoration: underline;
    text-decoration-color: transparent;
    text-underline-offset: 3px;
  }
  .dev-name:hover {
    color: var(--text-muted);
    text-decoration-color: var(--text-muted);
  }

  /* ── DEVELOPER MODAL OVERLAY ── */
  .dev-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .dev-overlay.open { opacity: 1; pointer-events: all; }

  /* ── DEVELOPER MODAL CARD ── */
  .dev-modal {
    position: relative;
    width: min(560px, 90vw);
    background: rgba(21,28,42,0.72);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid rgba(59,130,246,0.22);
    border-radius: 24px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 1px 0 rgba(255,255,255,0.1) inset;
    overflow: hidden;
    transform: translateY(30px) scale(0.94);
    transition: transform 0.4s cubic-bezier(.34,1.38,.64,1), opacity 0.35s ease;
    opacity: 0;
  }
  html.light .dev-modal {
    background: rgba(240,244,248,0.78);
    border-color: rgba(37,99,235,0.18);
    box-shadow: 0 32px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.6) inset;
  }
  .dev-overlay.open .dev-modal { transform: translateY(0) scale(1); opacity: 1; }

  .dev-modal-bar {
    height: 3px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4, #818cf8);
    background-size: 200% 100%;
    animation: gradShift 4s ease infinite;
  }
  .dev-modal-close {
    position: absolute; top: 16px; right: 18px;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; line-height: 1;
    transition: background 0.2s, color 0.2s, transform 0.2s;
  }
  html.light .dev-modal-close { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); }
  .dev-modal-close:hover { background: rgba(239,68,68,0.18); color: #ef4444; transform: rotate(90deg); }

  .dev-modal-body {
    display: flex; align-items: center; gap: 28px;
    padding: 32px 32px 36px;
  }
  .dev-photo-wrap {
    flex-shrink: 0;
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(6,182,212,0.2));
    border: 2px solid rgba(59,130,246,0.35);
    box-shadow: 0 8px 28px rgba(59,130,246,0.25), 0 0 0 4px rgba(59,130,246,0.08);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  html.light .dev-photo-wrap { border-color: rgba(37,99,235,0.3); box-shadow: 0 8px 24px rgba(37,99,235,0.15); }
  .dev-photo-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .dev-info { flex: 1; min-width: 0; }
  .dev-info-name {
    font-family: 'Sora', sans-serif;
    font-size: 20px; font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #60a5fa, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  html.light .dev-info-name {
    background: linear-gradient(135deg, #1d4ed8, #0891b2);
    -webkit-background-clip: text; background-clip: text;
  }
  .dev-info-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .dev-info-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--accent-cyan); margin-top: 1px; }
  .dev-info-label {
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;
  }
  .dev-info-value { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); line-height: 1.45; }
  .dev-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--border-light), transparent); margin: 12px 0; }

  /* ── LOADING CARD ── */
  .loading-card {
    background: rgba(33, 40, 58, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    border-radius: 20px;
    padding: 28px 40px 32px;
    width: min(380px, 88vw);
    box-shadow: 0 16px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 0; animation: fadeUp 0.6s ease 0.55s both;
  }
  html.light .loading-card {
    background: rgba(248,250,252,0.75);
    border-color: var(--border);
    box-shadow: 0 16px 48px rgba(37,99,235,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
  }

  /* top accent bar */
  .card-bar {
    height: 2px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4, #818cf8);
    background-size: 200% 100%;
    animation: gradShift 4s ease infinite;
    border-radius: 2px;
    margin-bottom: 24px;
  }

  /* ── SPINNER ── */
  .spinner-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }

  .spinner-ring {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--accent-blue);
    border-right-color: var(--accent-cyan);
    animation: spin 1s cubic-bezier(0.5,0,0.5,1) infinite;
    position: relative;
  }
  .spinner-ring::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(129,140,248,0.5);
    animation: spin 1.6s cubic-bezier(0.5,0,0.5,1) infinite reverse;
  }
  .spinner-ring::after {
    content: '';
    position: absolute;
    inset: 13px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 70%);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(0.9);} 50%{opacity:1;transform:scale(1.1);} }

  /* ── WAKING STATUS ── */
  .waking-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  .waking-sub {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 22px;
    line-height: 1.6;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.12);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 18px;
    position: relative;
  }
  html.light .progress-wrap {
    background: rgba(37,99,235,0.07);
    border-color: rgba(37,99,235,0.12);
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4, #818cf8);
    background-size: 200% 100%;
    animation: gradShift 3s ease infinite;
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 2s ease-in-out infinite;
    border-radius: 99px;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* ── DOTS STATUS ── */
  .dots-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-bottom: 4px;
  }

  .dot-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .dot-circle {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border-light);
    transition: background 0.4s, box-shadow 0.4s;
  }
  .dot-circle.active {
    background: var(--accent-blue);
    box-shadow: 0 0 10px rgba(59,130,246,0.6);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .dot-circle.done {
    background: var(--accent-green);
    box-shadow: 0 0 8px rgba(16,185,129,0.5);
  }
  @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.7);} }

  .dot-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .dot-line {
    flex: 1;
    height: 1px;
    background: var(--border);
    max-width: 30px;
    margin-bottom: 14px; /* align with circle row */
  }

  /* ── VERSION ── */
  .version-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    margin-top: 28px;
    display: flex; align-items: center; gap: 8px;
    justify-content: center;
    opacity: 0; animation: fadeUp 0.5s ease 0.85s both;
  }
  .v-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 7px var(--accent-green);
    animation: vPulse 2.2s ease-in-out infinite;
  }
  @keyframes vPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.65);} }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="grid-overlay"></div>
<canvas id="particleCanvas"></canvas>

<div class="page">

  <div class="logo-wrap">
    <img src="/static/low.ico" alt="EST-IMS">
  </div>

  <div class="status-chip">System Starting</div>

  <div class="brand-name" id="brandName">
    <span class="brand-text-inner" id="brandText"></span><span class="type-cursor" id="typeCursor"></span>
  </div>
  <div class="brand-suffix">Animal Nutrition</div>

  <div class="loading-card">
    <div class="card-bar"></div>

    <div class="spinner-wrap">
      <div class="spinner-ring"></div>
    </div>

    <div class="waking-label" id="statusLabel">WAKING SERVER...</div>
    <div class="waking-sub" id="statusSub">
      The server is waking from sleep mode.<br>This may take up to 60 seconds.
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-shimmer"></div>
    </div>

    <div class="dots-row" id="dotsRow">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="version-tag">
    <span class="v-dot"></span>
    EST-iMs® 2026
  </div>

  <div class="dev-credit">
    <span class="dev-dot"></span>
    <span class="dev-name" onclick="openDevModal()">Developed By Hamza K. Ghareb</span>
  </div>

</div>

<!-- DEVELOPER MODAL -->
<div class="dev-overlay" id="devOverlay" onclick="closeDevModalOutside(event)">
  <div class="dev-modal" id="devModal">
    <div class="dev-modal-bar"></div>
    <button class="dev-modal-close" onclick="closeDevModal()">✕</button>
    <div class="dev-modal-body">
      <div class="dev-photo-wrap">
        <img src="/static/me.jpg" alt="Hamza K. Ghareb">
      </div>
      <div class="dev-info">
        <div class="dev-info-name">Hamza K. Ghareb</div>
        <div class="dev-divider"></div>
        <div class="dev-info-row">
          <svg class="dev-info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
          <div>
            <div class="dev-info-label">Specialization</div>
            <div class="dev-info-value">Master of Business Administration</div>
          </div>
        </div>
        <div class="dev-info-row">
          <svg class="dev-info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <div>
            <div class="dev-info-label">Position</div>
            <div class="dev-info-value">Warehouse Keeper - IT</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── THEME ──
(function() {
  if (localStorage.getItem('est-theme') === 'light')
    document.documentElement.classList.add('light');
})();

// ── DEVELOPER MODAL ──
function openDevModal() {
  document.getElementById('devOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDevModal() {
  document.getElementById('devOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeDevModalOutside(e) {
  if (e.target === document.getElementById('devOverlay')) closeDevModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDevModal(); });

// ── TYPEWRITER LOOP ──
(function() {
  const word        = 'ALESTESHARIA';
  const el          = document.getElementById('brandText');
  const wrap        = document.getElementById('brandName');

  const typeSpeed   = 100;
  const deleteSpeed = 85;
  const pauseFull   = 2400;
  const pauseEmpty  = 550;

  wrap.style.opacity   = '0';
  wrap.style.transform = 'translateY(16px)';
  wrap.style.transition = 'opacity 0.55s ease, transform 0.55s ease';

  setTimeout(() => {
    wrap.style.opacity   = '1';
    wrap.style.transform = 'translateY(0)';

    let i = 0, deleting = false;

    function tick() {
      if (!deleting) {
        i++;
        el.textContent = word.slice(0, i);
        if (i === word.length) {
          setTimeout(() => { deleting = true; tick(); }, pauseFull);
        } else {
          setTimeout(tick, typeSpeed);
        }
      } else {
        i--;
        el.textContent = word.slice(0, i);
        if (i === 0) {
          deleting = false;
          setTimeout(tick, pauseEmpty);
        } else {
          setTimeout(tick, deleteSpeed);
        }
      }
    }
    tick();
  }, 500);
})();

// ── STEPS ──
const steps = [
  { label: 'Init',    sub: 'INITIALIZING SERVICES...', detail: 'Starting core services and dependencies.' },
  { label: 'DB',      sub: 'CONNECTING DATABASE...',   detail: 'Establishing database connection.' },
  { label: 'Cache',   sub: 'LOADING CACHE...',         detail: 'Warming up application cache.' },
  { label: 'Ready',   sub: 'ALMOST READY...',          detail: 'Performing final checks.' },
];

const dotsRow     = document.getElementById('dotsRow');
const progressFill = document.getElementById('progressFill');
const statusLabel  = document.getElementById('statusLabel');
const statusSub    = document.getElementById('statusSub');

// Build dot steps with lines between them
steps.forEach((s, i) => {
  if (i > 0) {
    const line = document.createElement('div');
    line.className = 'dot-line';
    dotsRow.appendChild(line);
  }
  const step = document.createElement('div');
  step.className = 'dot-step';
  step.innerHTML = `
    <div class="dot-circle" id="dot-${i}"></div>
    <div class="dot-label">${s.label}</div>
  `;
  dotsRow.appendChild(step);
});

let currentStep = 0;
const totalDuration = 55000; // 55s total spread across steps
const stepDurations = [10000, 15000, 15000, 15000];

function activateStep(i) {
  if (i >= steps.length) return;
  // mark previous done
  if (i > 0) {
    document.getElementById(`dot-${i-1}`).className = 'dot-circle done';
  }
  document.getElementById(`dot-${i}`).className = 'dot-circle active';
  statusLabel.textContent = steps[i].sub;
  statusSub.innerHTML = steps[i].detail + '<br>This may take up to 60 seconds.';
}

// Animate progress bar
let startTime = Date.now();
function updateProgress() {
  const elapsed = Date.now() - startTime;
  // clamp at 95% — actual redirect completes it
  const pct = Math.min(95, (elapsed / totalDuration) * 100);
  progressFill.style.width = pct + '%';

  // advance steps
  let acc = 0;
  for (let i = 0; i < stepDurations.length; i++) {
    acc += stepDurations[i];
    if (elapsed < acc && currentStep <= i) {
      if (currentStep < i) { currentStep = i; activateStep(i); }
      break;
    }
    if (i === stepDurations.length - 1 && currentStep < i) {
      currentStep = i; activateStep(i);
    }
  }

  if (pct < 95) requestAnimationFrame(updateProgress);
}

activateStep(0);
requestAnimationFrame(updateProgress);

// ── PING LOOP — redirect when server wakes ──
async function pingUntilAlive() {
  try {
    const res = await fetch('https://est-ims.onrender.com/ping', {
      signal: AbortSignal.timeout(8000)
    });
    if (res.ok) {
      // Server is awake — fill bar and redirect
      progressFill.style.transition = 'width 0.6s ease';
      progressFill.style.width = '100%';
      // mark all done
      steps.forEach((_, i) => {
        document.getElementById(`dot-${i}`).className = 'dot-circle done';
      });
      statusLabel.textContent = 'SERVER READY ✓';
      statusSub.innerHTML = 'Redirecting you now...';
setTimeout(() => { window.location.href = '/welcome'; }, 700);
      return;
    }
  } catch (_) { /* still sleeping */ }
  setTimeout(pingUntilAlive, 4000);
}

pingUntilAlive();

// ── PARTICLES ──
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [], mouse = { x: -999, y: -999 };
  const isLight = () => document.documentElement.classList.contains('light');

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function Particle() {
    this.x     = Math.random() * W;
    this.y     = Math.random() * H;
    this.vx    = (Math.random() - 0.5) * 0.35;
    this.vy    = (Math.random() - 0.5) * 0.35;
    this.r     = Math.random() * 1.6 + 0.4;
    this.alpha = Math.random() * 0.4 + 0.08;
  }

  Particle.prototype.update = function() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0) this.x = W; if (this.x > W) this.x = 0;
    if (this.y < 0) this.y = H; if (this.y > H) this.y = 0;
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 110) { this.x += dx/d*1.4; this.y += dy/d*1.4; }
  };

  function init() {
    resize(); particles = [];
    const n = Math.floor((W * H) / 13000);
    for (let i = 0; i < n; i++) particles.push(new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const light = isLight();
    const dc = light ? 'rgba(37,99,235,' : 'rgba(59,130,246,';
    const lc = light ? 'rgba(37,99,235,' : 'rgba(59,130,246,';
    const md = 135;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.update();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = dc + p.alpha + ')'; ctx.fill();
      for (let j = i+1; j < particles.length; j++) {
        const q  = particles[j];
        const dx = p.x - q.x, dy = p.y - q.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < md) {
          const a = (1 - d/md) * 0.15 * (light ? 1 : 0.65);
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = lc + a + ')'; ctx.lineWidth = 0.6; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });
  init(); draw();
})();
</script>
