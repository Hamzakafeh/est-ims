<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EST-iMS® | قيد التطوير</title>
  <link rel="icon" type="image/x-icon" href="/static/low.ico">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #071120 0%, #0d1b2a 45%, #132c45 100%);
      overflow: hidden;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: rgba(0, 183, 255, 0.08);
      border-radius: 50%;
      top: -250px;
      right: -200px;
      filter: blur(80px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(0, 132, 255, 0.08);
      border-radius: 50%;
      bottom: -200px;
      left: -150px;
      filter: blur(80px);
    }

    .container {
      width: 92%;
      max-width: 700px;
      padding: 50px 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      text-align: center;
      position: relative;
      z-index: 2;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: fadeIn 1s ease;
    }

    .logo {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: #4db8ff;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 10px 20px;
      border-radius: 100px;
      margin-bottom: 25px;
      font-size: 15px;
      color: #d9ecff;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00d26a;
      box-shadow: 0 0 12px #00d26a;
      animation: pulse 1.5s infinite;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      line-height: 1.9;
      color: #d4dbe5;
      margin-bottom: 35px;
    }

    .loader {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .loader span {
      display: block;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #00aaff, #4dc3ff);
      border-radius: 50px;
      animation: loading 2s infinite ease-in-out;
    }

    .footer {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-top: 15px;
    }

    .gear {
      font-size: 55px;
      margin-bottom: 25px;
      animation: spin 8s linear infinite;
      display: inline-block;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(350%);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.4);
        opacity: 0.7;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 25px;
      }

      h1 {
        font-size: 30px;
      }

      p {
        font-size: 16px;
      }

      .logo {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">EST-iMS®</div>

    <div class="status">
      <span class="dot"></span>
      النظام يعمل حالياً
    </div>

    <div class="gear">⚙️</div>

    <h1>الموقع قيد التطوير</h1>

    <p>
      نعمل حالياً على تطوير وتحسين النظام لإضافة مميزات جديدة
      وتحسين الأداء وتجربة الاستخدام.
      <br>
      الرجاء المحاولة لاحقاً.
    </p>

    <div class="loader">
      <span></span>
    </div>

    <div class="footer">
      EST Inventory Management System © 2026
    </div>
  </div>

</body>
</html>
