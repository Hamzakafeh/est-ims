<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>EST-iMs | Under Maintenance</title>
<link rel="icon" type="image/x-icon" href="/static/icons/low1.ico">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:.07;pointer-events:none;}
  .blob-1{width:600px;height:600px;background:radial-gradient(circle,#3b82f6,transparent 70%);top:-150px;left:-150px;animation:b1 20s ease-in-out infinite;}
  .blob-2{width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-120px;right:-120px;animation:b2 24s ease-in-out infinite;}
  @keyframes b1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
  @keyframes b2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
  .card{position:relative;z-index:10;text-align:center;padding:56px 48px;max-width:520px;width:90%;background:rgba(21,28,45,.9);border:1px solid rgba(59,130,246,.2);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.5);}
  .card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.7),transparent);}
  .logo{width:56px;height:56px;border-radius:14px;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(6,182,212,.15));border:1px solid rgba(59,130,246,.3);}
  .logo img{width:36px;height:36px;object-fit:contain;}
  .badge{display:inline-flex;align-items:center;gap:7px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);border-radius:50px;padding:5px 16px;font-size:11px;font-weight:700;color:#fcd34d;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;}
  .dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;box-shadow:0 0 8px #f59e0b;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
  h1{font-size:clamp(26px,5vw,36px);font-weight:800;letter-spacing:1px;margin-bottom:14px;background:linear-gradient(135deg,#60a5fa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  p{font-size:15px;color:#8b9db8;line-height:1.75;margin-bottom:10px;}
  .sub{font-size:13px;color:#52627a;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,.06);}
  .sub strong{color:#8b9db8;}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="logo"><img src="/static/icons/low.ico" alt="EST-iMs"></div>
  <div class="badge"><span class="dot"></span> Under Maintenance</div>
  <h1>We'll be back soon</h1>
  <p>EST-iMs is currently undergoing scheduled maintenance to improve your experience.</p>
  <p>We apologize for the inconvenience and appreciate your patience.</p>
  <div class="sub">
    <strong>EST-iMs</strong> · Inventory Management System<br>
    Alestesharia Animal Nutrition
  </div>
</div>

</body>
</html>
